name: Releases

on:
  push:
    tags:
    - '*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set RELEASE_VERSION
      run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

    - name: Restore cache
      id: cache-restore
      uses: actions/cache/restore@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('./.github/workflows/buildtools.sh') }}
        restore-keys: |
          ${{ runner.os }}-maven

    - name: Set up JDK 17/21/25
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: |
          17
          21
          25
        cache: gradle

    - name: Run BuildTools
      run: |
        bash ./.github/workflows/buildtools.sh

    - name: Build
      run: |
        ./gradlew build -PbuildVersion="$RELEASE_VERSION"
        mv orebfuscator-bukkit/build/libs/orebfuscator-*.jar ./

    - name: Save cache
      if: always() && steps.cache-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ~/.m2/repository
        key: ${{ steps.cache-restore.outputs.cache-primary-key }}

    - name: Release artifacts
      uses: ncipollo/release-action@v1
      with:
        artifacts: "orebfuscator-*.jar"
        name: Release ${{ env.RELEASE_VERSION }}
        token: ${{ secrets.GITHUB_TOKEN }}
